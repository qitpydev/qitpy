<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gold metallic gradient for chain links -->
    <radialGradient id="g" cx="35%" cy="25%" r="72%">
      <stop offset="0%"   stop-color="#fffce0"/>
      <stop offset="28%"  stop-color="#f5c000"/>
      <stop offset="65%"  stop-color="#a06800"/>
      <stop offset="100%" stop-color="#3a1e00"/>
    </radialGradient>
    <!-- Green leaf gradient -->
    <radialGradient id="lf" cx="35%" cy="28%" r="70%">
      <stop offset="0%"   stop-color="#d0ffd8"/>
      <stop offset="40%"  stop-color="#1eaa34"/>
      <stop offset="100%" stop-color="#063e10"/>
    </radialGradient>
    <!-- Clover center -->
    <radialGradient id="ct" cx="30%" cy="30%">
      <stop offset="0%"   stop-color="#80ffaa"/>
      <stop offset="100%" stop-color="#074a14"/>
    </radialGradient>
    <filter id="sd">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.65)"/>
    </filter>
    <filter id="gs">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="49" fill="#0d0d22"/>

  <!-- ══ GOLD CHAIN CIRCLE — 12 links on radius 31 ══ -->
  <!-- Each link: outer ellipse (rx=10 ry=6) + inner hole (rx=6 ry=3), rotated tangent to circle -->
  <g filter="url(#sd)">
    <g transform="translate(81,50) rotate(90)">
      <ellipse rx="10" ry="6" fill="url(#g)"/><ellipse rx="6" ry="3" fill="#090818"/>
    </g>
    <g transform="translate(76.8,65.5) rotate(120)">
      <ellipse rx="10" ry="6" fill="url(#g)"/><ellipse rx="6" ry="3" fill="#090818"/>
    </g>
    <g transform="translate(65.5,76.8) rotate(150)">
      <ellipse rx="10" ry="6" fill="url(#g)"/><ellipse rx="6" ry="3" fill="#090818"/>
    </g>
    <g transform="translate(50,81) rotate(0)">
      <ellipse rx="10" ry="6" fill="url(#g)"/><ellipse rx="6" ry="3" fill="#090818"/>
    </g>
    <g transform="translate(34.5,76.8) rotate(30)">
      <ellipse rx="10" ry="6" fill="url(#g)"/><ellipse rx="6" ry="3" fill="#090818"/>
    </g>
    <g transform="translate(23.2,65.5) rotate(60)">
      <ellipse rx="10" ry="6" fill="url(#g)"/><ellipse rx="6" ry="3" fill="#090818"/>
    </g>
    <g transform="translate(19,50) rotate(90)">
      <ellipse rx="10" ry="6" fill="url(#g)"/><ellipse rx="6" ry="3" fill="#090818"/>
    </g>
    <g transform="translate(23.2,34.5) rotate(120)">
      <ellipse rx="10" ry="6" fill="url(#g)"/><ellipse rx="6" ry="3" fill="#090818"/>
    </g>
    <g transform="translate(34.5,23.2) rotate(150)">
      <ellipse rx="10" ry="6" fill="url(#g)"/><ellipse rx="6" ry="3" fill="#090818"/>
    </g>
    <g transform="translate(50,19) rotate(0)">
      <ellipse rx="10" ry="6" fill="url(#g)"/><ellipse rx="6" ry="3" fill="#090818"/>
    </g>
    <g transform="translate(65.5,23.2) rotate(30)">
      <ellipse rx="10" ry="6" fill="url(#g)"/><ellipse rx="6" ry="3" fill="#090818"/>
    </g>
    <g transform="translate(76.8,34.5) rotate(60)">
      <ellipse rx="10" ry="6" fill="url(#g)"/><ellipse rx="6" ry="3" fill="#090818"/>
    </g>
  </g>

  <!-- ══ FOUR-LEAF CLOVER — heart-shaped bezier leaves, centred at (61,31) ══ -->
  <!-- Leaf path: heart shape pointing away from centre, rotated 0/90/180/270° -->
  <g filter="url(#sd)">
    <!-- Top leaf -->
    <path d="M61,31 C57,29 51,25 51,19 C51,13 58,10 61,14 C64,10 71,13 71,19 C71,25 65,29 61,31 Z" fill="url(#lf)"/>
    <!-- Right leaf -->
    <path d="M61,31 C57,29 51,25 51,19 C51,13 58,10 61,14 C64,10 71,13 71,19 C71,25 65,29 61,31 Z" fill="url(#lf)" transform="rotate(90 61 31)"/>
    <!-- Bottom leaf -->
    <path d="M61,31 C57,29 51,25 51,19 C51,13 58,10 61,14 C64,10 71,13 71,19 C71,25 65,29 61,31 Z" fill="url(#lf)" transform="rotate(180 61 31)"/>
    <!-- Left leaf -->
    <path d="M61,31 C57,29 51,25 51,19 C51,13 58,10 61,14 C64,10 71,13 71,19 C71,25 65,29 61,31 Z" fill="url(#lf)" transform="rotate(270 61 31)"/>
  </g>

  <!-- Leaf veins -->
  <g stroke="#05400e" stroke-linecap="round" opacity="0.55">
    <line x1="61" y1="30" x2="61" y2="12" stroke-width="0.7"/>
    <line x1="61" y1="21" x2="57" y2="16" stroke-width="0.45"/>
    <line x1="61" y1="21" x2="65" y2="16" stroke-width="0.45"/>
    <line x1="61" y1="30" x2="61" y2="12" stroke-width="0.7" transform="rotate(90 61 31)"/>
    <line x1="61" y1="21" x2="57" y2="16" stroke-width="0.45" transform="rotate(90 61 31)"/>
    <line x1="61" y1="21" x2="65" y2="16" stroke-width="0.45" transform="rotate(90 61 31)"/>
    <line x1="61" y1="30" x2="61" y2="12" stroke-width="0.7" transform="rotate(180 61 31)"/>
    <line x1="61" y1="21" x2="57" y2="16" stroke-width="0.45" transform="rotate(180 61 31)"/>
    <line x1="61" y1="21" x2="65" y2="16" stroke-width="0.45" transform="rotate(180 61 31)"/>
    <line x1="61" y1="30" x2="61" y2="12" stroke-width="0.7" transform="rotate(270 61 31)"/>
    <line x1="61" y1="21" x2="57" y2="16" stroke-width="0.45" transform="rotate(270 61 31)"/>
    <line x1="61" y1="21" x2="65" y2="16" stroke-width="0.45" transform="rotate(270 61 31)"/>
  </g>

  <!-- Clover centre -->
  <circle cx="61" cy="31" r="5.5" fill="url(#ct)" filter="url(#sd)"/>
  <circle cx="59.5" cy="29.5" r="1.5" fill="rgba(255,255,255,0.4)"/>
</svg>
